name: Content Gap Briefs

on:
  schedule:
    - cron: '35 21 * * 2'
  workflow_dispatch:

jobs:
  generate-briefs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate content gap briefs
        run: |
          python tools/content_gap_briefs.py \
            --site-dir . \
            --topics tools/content_topics.json \
            --max-briefs 8 \
            --write-report reports/content-gap-briefs.md

      - name: Commit updated briefs
        run: |
          if git diff --quiet -- reports/content-gap-briefs.md; then
            echo "No brief changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/content-gap-briefs.md
          git commit -m "Update content gap briefs"
          git push
