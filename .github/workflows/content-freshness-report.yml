name: Content Freshness Report

on:
  schedule:
    - cron: '05 22 * * 2'
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate freshness report
        run: |
          python tools/content_freshness_audit.py \
            --site-dir . \
            --stale-after-days 120 \
            --min-inbound 4 \
            --top 12 \
            --write-report reports/content-freshness-report.md

      - name: Commit updated report
        run: |
          if git diff --quiet -- reports/content-freshness-report.md; then
            echo "No report changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/content-freshness-report.md
          git commit -m "Update content freshness report"
          git push
