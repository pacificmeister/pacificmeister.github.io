name: Link Health Report

on:
  schedule:
    - cron: '45 21 * * 2'
  workflow_dispatch:

jobs:
  audit-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run link health audit
        run: |
          python tools/link_health_audit.py \
            --site-dir . \
            --check-external \
            --external-limit 200 \
            --timeout 8 \
            --write-report reports/link-health-report.md

      - name: Commit updated report
        run: |
          if git diff --quiet -- reports/link-health-report.md; then
            echo "No report changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/link-health-report.md
          git commit -m "Update link health report"
          git push
